{% extends "base.html" %}

{% block title %}新增部门 - 加班填报系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-building"></i> 新增部门</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-4">
                <label class="form-label">{{ form.name.label }}</label>
                {{ form.name(class="form-control") }}
                {% if form.name.errors %}
                    <div class="text-danger small">{{ form.name.errors[0] }}</div>
                {% endif %}
            </div>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_departments') }}" class="btn btn-secondary">取消</a>
                {{ form.submit(class="btn btn-primary") }}
            </div>
        </form>
    </div>
</div>
{% endblock %}
